name: Daily Horizon Summary

on:
  schedule:
    # GitHub scheduled workflows use UTC. 23:00 UTC is 07:00 Asia/Shanghai
    # on the following calendar day; scheduled runs may start with a delay.
    - cron: '0 23 * * *'
  workflow_dispatch:      # Allow manual trigger

concurrency:
  group: daily-horizon-summary
  cancel-in-progress: false

jobs:
  daily-summary:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Needed to commit changes

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          version: "0.11.26"

      - name: Install dependencies
        run: uv sync

      - name: Prepare GitHub Actions config
        run: cp data/config.github.json data/config.json

      - name: Run Horizon
        env:
          # The pilot uses DeepSeek only. Add this repository secret in GitHub.
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: uv run horizon --hours 24

      - name: Set Beijing report date
        run: echo "DATE=$(TZ=Asia/Shanghai date +'%Y-%m-%d')" >> "$GITHUB_ENV"

      - name: Archive boss industry digest
        shell: bash
        run: |
          archive_dir="老板行业日报/$(date -d "$DATE" +'%Y')/$(date -d "$DATE" +'%m')"
          mkdir -p "$archive_dir"
          cp "data/summaries/horizon-$DATE-zh.md" "$archive_dir/$DATE.md"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -- 老板行业日报/
          if git diff --cached --quiet; then
            echo "Archive already up to date."
          else
            git commit -m "日报: $DATE"
            git push
          fi

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          keep_files: true  # Keep existing summaries on gh-pages branch
          commit_message: "📝 Daily Summary: ${{ env.DATE }}"
          publish_branch: gh-pages
          enable_jekyll: true
